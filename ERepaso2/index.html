<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio de Repaso 1</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        :root {
            --primary: #004F67;
            --primary-dark: #00779A;
        }

        body {
            font-family: 'Poppins', sans-serif;
            font-size: 18px;
            line-height: 1.6;
            color: #004F67;
            background-color: #f0f5f5;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        #main-container {
            width: 95%;
            max-width: 1000px;
            height: 850px; 
            background: white;
            border-radius: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .scroll-content {
            flex: 1;
            overflow-y: auto;
            padding: 2rem 3rem;
            scrollbar-width: thin;
            scrollbar-color: var(--primary) #f1f1f1;
        }

        .text-custom { color: var(--primary); }
        .bg-custom { background-color: var(--primary); }

        .btn-action {
            background-color: var(--primary);
            color: white;
            padding: 1rem 3.5rem;
            border-radius: 99px;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            display: inline-block;
        }
        .btn-action:hover:not(:disabled) {
            background-color: var(--primary-dark);
            transform: translateY(-2px);
        }

        .option-card {
            transition: all 0.2s ease;
            border: 2px solid #f1f5f9;
        }
        
        .option-card.selected {
            border-color: var(--primary);
            background-color: #f0fdfa;
        }

        .option-card.locked {
            pointer-events: none;
        }

        .circle-bar { 
            fill: none; 
            stroke: var(--primary); 
            stroke-width: 10; 
            stroke-linecap: round; 
            transition: stroke-dashoffset 1.5s ease-out;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="main-container">
        
        <div id="screen-start" class="scroll-content flex flex-col items-center justify-center text-center animate__animated animate__fadeIn">
            <h1 class="text-5xl font-bold text-custom mb-6 leading-tight">Ejercicio de Repaso 2</h1>
            <p class="mb-4 text-slate-600 font-semibold">Responsabilidad Médica, Ética y Moral</p>
            <p class="mb-12 max-w-2xl text-slate-500 text-xl">¡Bienvenido/a al ejercicio de repaso numero 2!</p>
            <button onclick="startQuiz()" class="btn-action text-xl shadow-lg">INICIAR</button>
        </div>

        <div id="screen-quiz" class="hidden flex flex-col h-full">
            <div class="px-14 pt-10 flex justify-between items-center bg-white z-10">
                <span id="q-number" class="font-bold text-custom text-sm tracking-widest uppercase"></span>
                <div class="w-48 h-2 bg-slate-100 rounded-full overflow-hidden">
                    <div id="progress-fill" class="h-full bg-custom transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>

            <div class="scroll-content">
                <p id="q-instruction" class="text-custom font-bold italic mb-4 text-base text-slate-600">
                    Seleccione Verdadero o Falso:
                </p>
                <h2 id="q-text" class="text-xl font-semibold mb-8 leading-snug text-slate-800 border-l-4 border-custom pl-4 py-2 bg-slate-50"></h2>

                <div id="options-container" class="space-y-4"></div>

                <div id="feedback-box" class="hidden mt-6 p-6 rounded-3xl border-2 animate__animated animate__fadeInUp">
                    <p id="feedback-title" class="font-bold text-xl mb-2"></p>
                    <div id="feedback-body" class="text-base leading-relaxed text-slate-700"></div>
                    <button onclick="nextStep()" class="mt-4 bg-slate-800 text-white px-10 py-2 rounded-xl hover:bg-black transition-all font-bold">Continuar</button>
                </div>

                <button id="btn-validate" onclick="validateAnswer()" class="btn-action w-full mt-8 shadow-xl text-lg">Validar Respuesta</button>
            </div>
        </div>

        <div id="screen-results" class="hidden scroll-content flex flex-col items-center justify-center text-center">
            <h2 class="text-4xl font-bold mb-4">Resultado Final</h2>
            <div class="relative flex items-center justify-center my-6">
                <svg class="w-64 h-64 -rotate-90">
                    <circle cx="128" cy="128" r="110" stroke="#f1f5f9" stroke-width="10" fill="none"></circle>
                    <circle id="final-circle" cx="128" cy="128" r="110" class="circle-bar" stroke-dasharray="691" stroke-dashoffset="691"></circle>
                </svg>
                <div class="absolute text-6xl font-black text-slate-800"><span id="result-percent">0</span>%</div>
            </div>
            <p id="result-score" class="text-2xl font-bold mb-4 text-slate-700"></p>
            <div id="result-msg" class="max-w-2xl mb-8 p-6 bg-slate-50 rounded-3xl italic text-slate-600"></div>
            <button onclick="location.reload()" class="btn-action">Intentar de nuevo</button>
        </div>
    </div>

    <script>
        const quizData = [
            {
                question: "1. El ejercicio de la profesión en salud, implica una gran responsabilidad, y dependiendo de los resultados, lo puede involucrar administrativa, disciplinaria, civil, y penalmente.",
                options: [{t: "Verdadero", c: true}, {t: "Falso", c: false}],
                feedback: "El profesional de la salud está sujeto a múltiples marcos normativos. Sus acciones pueden derivar en procesos administrativos, sanciones disciplinarias de tribunales éticos, reparaciones civiles por daños o incluso consecuencias penales si se tipifica un delito."
            },
            {
                question: "2. Los códigos de ética médica en general permiten a la sociedad una defensa contra la mala práctica, que excepcionalmente ejercen algunos profesionales de la medicina, violando los preceptos éticos de la misma.",
                options: [{t: "Verdadero", c: true}, {t: "Falso", c: false}],
                feedback: "Los códigos de ética actúan como un estándar de conducta que protege a la sociedad, estableciendo los límites y deberes que los profesionales deben respetar para garantizar una atención digna y segura."
            },
            {
                question: "3. El papel del tribunal de la ética médica: Es garantizar el correcto ejercicio de la medicina mediante la función pública de investigar y juzgar faltas ético-profesionales de los médicos, aplicando el debido proceso y las sanciones correspondientes para proteger a los pacientes y la integridad de la profesión.",
                options: [{t: "Verdadero", c: true}, {t: "Falso", c: false}],
                feedback: "Esta instancia es fundamental para el autocontrol de la profesión médica, asegurando que cualquier desviación de los principios éticos sea evaluada y sancionada bajo el marco de la ley."
            },
            {
                question: "4. La responsabilidad médica en un proceso de atención en salud puede ser: contractual y extracontractual.",
                options: [{t: "Verdadero", c: true}, {t: "Falso", c: false}],
                feedback: "La responsabilidad contractual nace del acuerdo de voluntades entre el médico/institución y el paciente, mientras que la extracontractual surge por el daño causado sin necesidad de un contrato previo."
            },
            {
                question: "5. Se dice que hay culpa o negligencia médica a la carencia de atención durante el ejercicio médico.",
                options: [{t: "Verdadero", c: true}, {t: "Falso", c: false}],
                feedback: "La negligencia se configura cuando hay un descuido, omisión o falta de aplicación de los cuidados debidos, lo que constituye una forma de culpa en el acto médico."
            },
            {
                question: "6. La moral es un principio ético y una norma para la vida.",
                options: [{t: "Verdadero", c: false}, {t: "Falso", c: true}],
                feedback: "Realimentación: La moral es el conjunto de normas, valores, creencias y costumbres que guían la conducta de las personas en una sociedad, permitiéndoles diferenciar entre lo bueno y lo malo, lo correcto e incorrecto. Actúa como un regulador de la convivencia social y se transmite a través de la cultura, la familia o la tradición."
            },
            {
                question: "7. Reflexionar sobre por qué es importante no robar o por qué la libertad es un valor fundamental, se puede decir que hace relación a la ética.",
                options: [{t: "Verdadero", c: true}, {t: "Falso", c: false}],
                feedback: "Exacto. La ética es precisamente esa rama de la filosofía que reflexiona críticamente sobre la moral y los valores que fundamentan nuestras acciones."
            },
            {
                question: "8. La moral se recibe; la ética se construye.",
                options: [{t: "Verdadero", c: true}, {t: "Falso", c: false}],
                feedback: "La moral suele ser heredada cultural y socialmente, mientras que la ética requiere un proceso individual y reflexivo de construcción de principios propios."
            },
            {
                question: "9. Los tipos de responsabilidad pueden ser: Individual y colectiva.",
                options: [{t: "Verdadero", c: false}, {t: "Falso", c: true}],
                feedback: "Realimentación: Los tipos de responsabilidades son diversos y se clasifican según el ámbito de aplicación (jurídico, social o personal), implicando el cumplimiento de obligaciones, el cuidado en las decisiones y la asunción de las consecuencias. Se dividen principalmente en responsabilidad penal (delitos), civil (reparación de daños), administrativa (incumplimiento funcional), social (impacto comunitario), laboral (obligaciones de trabajo) y moral/ética (principios personales)."
            },
            {
                question: "10. Cuando hablamos de Lex Artir: se refiere al conjunto de conocimientos, técnicas y cuidados que un profesional debe aplicar en una situación dada, que debe ser demostrada con pruebas técnicas.",
                options: [{t: "Verdadero", c: true}, {t: "Falso", c: false}],
                feedback: "Realimentación: La Lex Artis (o Lex Artis Ad Hoc) es el criterio valorativo para determinar si el acto médico fue correcto. Se basa en el cumplimiento de los protocolos, conocimientos científicos actualizados y la diligencia técnica requerida en cada caso clínico específico, cuya observancia debe validarse mediante pruebas periciales o técnicas."
            }
        ];

        let currentIdx = 0;
        let score = 0;

        function startQuiz() {
            document.getElementById('screen-start').classList.add('hidden');
            document.getElementById('screen-quiz').classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            const q = quizData[currentIdx];
            document.getElementById('q-number').innerText = `PREGUNTA ${currentIdx + 1}/${quizData.length}`;
            document.getElementById('progress-fill').style.width = `${((currentIdx + 1)/quizData.length)*100}%`;
            document.getElementById('q-text').innerText = q.question;
            document.getElementById('feedback-box').classList.add('hidden');
            document.getElementById('btn-validate').classList.remove('hidden');
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';

            q.options.forEach((opt, i) => {
                const d = document.createElement('div');
                d.className = "option-card flex items-center p-5 rounded-2xl cursor-pointer hover:bg-slate-50";
                d.innerHTML = `
                    <input type="radio" name="ans" id="o${i}" value="${i}" class="w-6 h-6 accent-[#004F67]">
                    <label for="o${i}" class="ml-4 w-full cursor-pointer font-semibold text-lg text-slate-700">${opt.t}</label>
                `;
                d.onclick = () => {
                    if (d.classList.contains('locked')) return;
                    document.querySelectorAll('.option-card').forEach(el => el.classList.remove('selected'));
                    d.classList.add('selected');
                    d.querySelector('input').checked = true;
                };
                container.appendChild(d);
            });
        }

        function validateAnswer() {
            const q = quizData[currentIdx];
            const sel = document.querySelector('input[name="ans"]:checked');
            
            if(!sel) return;

            document.querySelectorAll('.option-card').forEach(el => el.classList.add('locked'));
            
            const isCorrect = q.options[sel.value].c;
            if(isCorrect) score++;
            
            const fBox = document.getElementById('feedback-box');
            fBox.classList.remove('hidden', 'bg-green-50', 'border-green-200', 'bg-red-50', 'border-red-200');
            document.getElementById('btn-validate').classList.add('hidden');

            const fTitle = document.getElementById('feedback-title');
            if(isCorrect) {
                fTitle.innerText = "¡Correcto!";
                fTitle.className = "font-bold text-xl text-green-700 mb-1";
                fBox.classList.add('bg-green-50', 'border-green-200');
            } else {
                fTitle.innerText = "Incorrecto";
                fTitle.className = "font-bold text-xl text-red-700 mb-1";
                fBox.classList.add('bg-red-50', 'border-red-200');
            }
            
            document.getElementById('feedback-body').innerHTML = q.feedback;
        }

        function nextStep() {
            currentIdx++;
            if(currentIdx < quizData.length) {
                renderQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('screen-quiz').classList.add('hidden');
            document.getElementById('screen-results').classList.remove('hidden');
            
            const percent = Math.round((score / quizData.length) * 100);
            const circle = document.getElementById('final-circle');
            const circumference = 691;
            
            setTimeout(() => {
                const offset = circumference - (percent / 100) * circumference;
                circle.style.strokeDashoffset = offset;
                
                let count = 0;
                const timer = setInterval(() => {
                    if(count >= percent) {
                        document.getElementById('result-percent').innerText = percent;
                        clearInterval(timer);
                    } else {
                        count++;
                        document.getElementById('result-percent').innerText = count;
                    }
                }, 15);
            }, 300);

            document.getElementById('result-score').innerText = `Puntaje: ${score} de ${quizData.length}`;
            const msg = document.getElementById('result-msg');
            
            if(percent === 100) msg.innerHTML = "¡Excelente! Has demostrado un conocimiento impecable sobre responsabilidad médica y ética.";
            else if(percent >= 70) msg.innerHTML = "¡Buen trabajo! Tienes claros los conceptos fundamentales de la profesión y su marco ético.";
            else msg.innerHTML = "Te recomendamos revisar la diferencia entre ética y moral, así como los tipos de responsabilidad jurídica.";
        }
    </script>
</body>
</html>
