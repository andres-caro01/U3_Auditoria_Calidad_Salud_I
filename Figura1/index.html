<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Principios Básicos de la Bioética</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-blue: #1a5f7a;
            --accent-blue: #0099ff;
            --bg-light: #f0f7ff;
            --white: #ffffff;
            --text-dark: #333;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            width: 90%;
            max-width: 1100px;
            background: var(--white);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            text-align: center;
            border: 2px solid #e1e8f0;
        }

        h1 {
            color: var(--primary-blue);
            font-size: 2.5rem;
            margin-bottom: 50px;
            font-weight: 700;
            position: relative;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
        }

        /* Estilo de las Tarjetas */
        .card {
            background: var(--white);
            padding: 30px 20px;
            border-radius: 20px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            opacity: 0;
            /* Para la animación de entrada */
            transform: translateY(30px);
            animation: fadeInUp 0.6s forwards;
            border: 1px solid #f0f0f0;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0, 153, 255, 0.15);
            border-color: var(--accent-blue);
        }

        /* Iconos Circulares */
        .icon-wrapper {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #ffffff 0%, #e6f3ff 100%);
            border: 3px solid var(--accent-blue);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            font-size: 2.5rem;
            color: var(--primary-blue);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.05);
        }

        .card:hover .icon-wrapper {
            background: var(--accent-blue);
            color: white;
            transform: rotate(10deg);
        }

        .title {
            font-weight: 600;
            color: var(--primary-blue);
            font-size: 1.1rem;
            margin-bottom: 15px;
            height: 50px;
            display: flex;
            align-items: center;
        }

        .arrow {
            font-size: 1.8rem;
            color: var(--accent-blue);
            margin-bottom: 15px;
            animation: bounce 2s infinite;
        }

        .description {
            font-size: 0.95rem;
            color: #666;
            line-height: 1.4;
            font-weight: 400;
        }

        /* Animaciones */
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes bounce {

            0%,
            20%,
            50%,
            80%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(5px);
            }

            60% {
                transform: translateY(3px);
            }
        }

        /* Retrasos para el efecto escalonado */
        .card:nth-child(1) {
            animation-delay: 0.1s;
        }

        .card:nth-child(2) {
            animation-delay: 0.3s;
        }

        .card:nth-child(3) {
            animation-delay: 0.5s;
        }

        .card:nth-child(4) {
            animation-delay: 0.7s;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Principios Básicos de la Bioética</h1>

        <div class="grid">
            <div class="card">
                <div class="icon-wrapper">
                    <i class="fa-solid fa-brain"></i>
                </div>
                <div class="title">Principio de Autonomía</div>
                <div class="arrow">↓</div>
                <div class="description">Tomar decisiones informadas</div>
            </div>

            <div class="card">
                <div class="icon-wrapper">
                    <i class="fa-solid fa-pills"></i>
                </div>
                <div class="title">Principio de Beneficencia</div>
                <div class="arrow">↓</div>
                <div class="description">Actuar siempre buscando el bien del paciente</div>
            </div>

            <div class="card">
                <div class="icon-wrapper">
                    <i class="fa-solid fa-hand-holding-medical"></i>
                </div>
                <div class="title">Principio de No Maleficencia</div>
                <div class="arrow">↓</div>
                <div class="description">No infringir daño intencionadamente</div>
            </div>

            <div class="card">
                <div class="icon-wrapper">
                    <i class="fa-solid fa-scale-balanced"></i>
                </div>
                <div class="title">Principio de Justicia</div>
                <div class="arrow">↓</div>
                <div class="description">Tratamiento equitativo y apropiado de pacientes</div>
            </div>
        </div>
    </div>

</body>

</html>
