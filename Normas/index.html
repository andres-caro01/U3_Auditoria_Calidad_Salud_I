<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Normas y Ética - Interactivo con Iconos</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-color: #050a14;
            --card-bg: rgba(10, 25, 47, 0.7);
            --neon-blue: #00d2ff;
            --neon-glow: #00d2ff88;
            --text-color: #e0e6ed;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            padding: 40px;
            max-width: 1200px;
            width: 100%;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid rgba(0, 210, 255, 0.2);
            border-radius: 20px;
            padding: 30px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--neon-blue);
            box-shadow: 0 0 20px var(--neon-glow);
        }

        /* Estilos específicos para los iconos */
        .card-icon {
            font-size: 4rem; /* Icono grande */
            color: var(--neon-blue);
            margin-bottom: 25px;
            transition: all 0.3s ease;
            filter: drop-shadow(0 0 8px var(--neon-blue));
        }

        .card:hover .card-icon {
            transform: scale(1.1); /* Efecto pop al hover */
            filter: drop-shadow(0 0 15px var(--neon-blue));
        }

        .card h3 {
            margin: 0;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 1.1rem;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: #0a192f;
            border: 2px solid var(--neon-blue);
            border-radius: 25px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            position: relative;
            box-shadow: 0 0 40px rgba(0, 210, 255, 0.3);
            animation: modalIn 0.5s ease-out;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            color: var(--neon-blue);
            font-size: 1.5rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .close-btn:hover {
            transform: rotate(90deg) scale(1.2);
        }

        .modal-body p {
            line-height: 1.8;
            font-size: 1.05rem;
            text-align: justify;
            color: var(--text-color);
        }

        .modal-body h2 {
            color: var(--neon-blue);
            margin-top: 0;
            border-bottom: 1px solid rgba(0, 210, 255, 0.3);
            padding-bottom: 10px;
            text-transform: uppercase;
            font-size: 1.5rem;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card" data-aos="fade-up" data-aos-delay="100" onclick="openModal('normas-juridicas')">
        <i class="fa-solid fa-scale-balanced card-icon"></i>
        <h3>Normas jurídicas</h3>
    </div>

    <div class="card" data-aos="fade-up" data-aos-delay="200" onclick="openModal('normas-morales')">
        <i class="fa-solid fa-heart-pulse card-icon"></i>
        <h3>Normas morales</h3>
    </div>

    <div class="card" data-aos="fade-up" data-aos-delay="300" onclick="openModal('normas-sociales')">
        <i class="fa-solid fa-users-viewfinder card-icon"></i>
        <h3>Normas sociales</h3>
    </div>

    <div class="card" data-aos="fade-up" data-aos-delay="400" onclick="openModal('normas-religiosas')">
        <i class="fa-solid fa-book-bible card-icon"></i>
        <h3>Normas religiosas</h3>
    </div>
</div>

<div id="modalOverlay" class="modal-overlay" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <div id="modalBody" class="modal-body">
            </div>
    </div>
</div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    // Inicializar animaciones de entrada
    AOS.init({ duration: 1000, once: true });

    // Datos íntegros de la imagen
    const data = {
        'normas-juridicas': {
            title: 'Normas jurídicas',
            text: 'Son de obligatorio cumplimiento para todos los integrantes de una sociedad, están escritas y su no cumplimiento serán sujetas de sanción. Como por ejemplo la aplicación de protocolos en la atención de las enfermedades de Interés en salud pública, regidas por el Instituto Nacional de Salud Pública. (Dengue, malaria, Hipertensión, cáncer, diabetes).'
        },
        'normas-morales': {
            title: 'Normas morales',
            text: 'Se basan en los valores y principios que una sociedad considera importante, por lo que varían de una comunidad a otra. Se transmiten de generación en generación.'
        },
        'normas-sociales': {
            title: 'Normas sociales',
            text: 'Guían el comportamiento de las personas en determinadas situaciones sociales. Se transmiten de generación en generación y su no cumplimiento suelen generar el rechazo social.'
        },
        'normas-religiosas': {
            title: 'Normas religiosas',
            text: 'Guían el comportamiento de los miembros de una determinada religión o credo, y están expresadas en libros sagrados o emanan de alguna autoridad religiosa.'
        }
    };

    function openModal(key) {
        const item = data[key];
        document.getElementById('modalBody').innerHTML = `<h2>${item.title}</h2><p>${item.text}</p>`;
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modalOverlay').style.display = 'none';
    }

    // Cerrar modal con tecla ESC
    document.addEventListener('keydown', function(event) {
        if (event.key === "Escape") {
            closeModal();
        }
    });
</script>

</body>
</html>
